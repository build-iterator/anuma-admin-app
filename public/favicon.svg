<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Anuma logomark: Morse A (dot dash). Dash = 3 dots; 1 dot of air between. -->
  <style>
    .mark { fill: #0d0d0d; }
    @media (prefers-color-scheme: dark) { .mark { fill: #ffffff; } }
  </style>
  <circle class="mark" cx="18" cy="50" r="8"/>
  <rect class="mark" x="42" y="42" width="48" height="16"/>
</svg>
